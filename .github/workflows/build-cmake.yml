name: Build

on:
  workflow_call:
    inputs:
      module:
        description: 'Module to be used in CMake config'
        required: true
        type: string

      os:
        description: '"Windows" or "Linux"'
        required: true
        type: string

      bitness:
        description: '32 or 64'
        required: true
        type: number

      run_tests:
        description: 'Build the test target and run CTest before building the module (gates the binary)'
        required: false
        type: boolean
        default: false

      test_cmake_flags:
        description: 'Extra CMake configure flags that enable the test target (e.g. -DLG_BUILD_TESTS=ON)'
        required: false
        type: string
        default: ''

      test_target:
        description: 'CMake target that builds the test executable (required when run_tests is true)'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: ${{ inputs.module }}-${{ inputs.os }}-${{ inputs.bitness }}
    runs-on: ${{ inputs.os == 'Linux' &&  'ubuntu-24.04' || 'windows-2025-vs2026'}}
    container: ${{ inputs.os == 'Linux' && 'ghcr.io/acidicoala/koalabox:master' || '' }}
    env:
      BUILD_DIR: ./build
      C_COMPILER: ${{ inputs.os == 'Linux' && 'clang' || 'cl' }}
      CXX_COMPILER: ${{ inputs.os == 'Linux' && 'clang++' || 'cl' }}
      OUTPUT_PATH: ${{ inputs.os == 'Linux' && '*.so' || 'Release/*.dll' }}
      WIN_FLAGS: ${{ inputs.os == 'Windows' && inputs.bitness == 32 && '-A=Win32' || '' }}
      LINUX_FLAGS: ${{ inputs.os == 'Linux' && inputs.bitness == 32 && '-DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32' || '' }}
    steps:
      - name: '🛠️ Check Linux compiler versions'
        if: ${{ inputs.os == 'Linux' }}
        run: |
          clang++ --version
          g++ --version

      - name: '📥 Check out repository code'
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: '🗃️ Cache CPM dependencies'
        uses: actions/cache@v5
        with:
          # KoalaBox.cmake points CPM_SOURCE_CACHE and FETCHCONTENT_BASE_DIR at
          # $HOME/.cache/cmake/{cpm,fetchcontent} — not the build dir — so that is what we cache.
          key: deps-cache-${{ inputs.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          path: ~/.cache/cmake

      - name: '⚙️ Generate build files'
        # Note: indenting arguments will lead to parsing errors
        run: >
          cmake
          -B "${{ env.BUILD_DIR }}"
          -DMODULE=${{ github.event.inputs.module }}
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ env.C_COMPILER }}
          -DCMAKE_CXX_COMPILER=${{ env.CXX_COMPILER }}
          ${{ env.WIN_FLAGS }}
          ${{ env.LINUX_FLAGS }}
          ${{ inputs.test_cmake_flags }}

      # Gate the binary on the tests: the test target shares this configured build tree with the
      # module, so the heavy dependencies are compiled once. A failure here fails the job before
      # the module is built or uploaded.
      - name: '🏗️ Build tests'
        if: ${{ inputs.run_tests }}
        run: >
          cmake
          --build ${{ env.BUILD_DIR }}
          --config Release
          --target ${{ inputs.test_target }}

      - name: '🧪 Run tests'
        if: ${{ inputs.run_tests }}
        run: ctest --test-dir ${{ env.BUILD_DIR }} --build-config Release --output-on-failure

      - name: '🏗️ Build ${{ inputs.module }}'
        run: >
          cmake
          --build ${{ env.BUILD_DIR }}
          --config Release
          --target ${{ inputs.module }}

      - name: '🌳 Print build tree'
        if: ${{ inputs.os == 'Linux' }}
        run: tree ${{ env.BUILD_DIR }}

      - name: '📤 Upload binaries'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.module }}-${{ inputs.os }}-${{ inputs.bitness }}
          path: ${{ env.BUILD_DIR }}/${{ env.OUTPUT_PATH }}
